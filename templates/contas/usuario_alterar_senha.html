{% extends 'base.html' %}

{% block title %}
Trocar senha - {{ block.super}}
{% endblock title %}

{% block body %}

<br />
<br />
<p>Alterar Senha</p>
<form action="" method="POST">
    {% csrf_token %}
    <label>Senha anterior</label>
    <br />
    {{ form.senha_antiga }}
    <br />
    <br />
    <label>Nova senha</label>
    <br />
    {{ form.nova_senha }}
    <br />
    <br />
    <label>Confirmar nova senha</label>
    <br />
    {{ form.confirmacao_senha_nova }}
    <br />
    <br />
    <button type="submit">Atualizar</button>
</form>

{% endblock body %}
